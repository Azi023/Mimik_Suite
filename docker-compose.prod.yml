# Mimik Suite — production compose (Hetzner VPS via Coolify).
#
# IMAGES ARE PULLED, NOT BUILT, ON THE VPS. The box has ~1.8GB free RAM and
# cannot build the ~1.5GB Playwright API image. Build locally / in CI, push to
# ghcr.io, and reference the tags here. See docs/DEPLOY.md.
#
# Postgres is EXTERNAL (Supabase) — there is intentionally no postgres service.
# The app reads DATABASE_URL (postgresql+asyncpg://...) from the environment.
#
# Validate locally:  docker compose -f docker-compose.prod.yml config

services:
  api:
    image: ${API_IMAGE:-ghcr.io/OWNER/mimik-suite-api:latest}
    # For a LOCAL build (never on the VPS), comment `image:` above and use:
    # build:
    #   context: ..                       # parent dir — see Dockerfile.api header
    #   dockerfile: Mimik_Suite/Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Redis lives in this compose network; override any host-local default.
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    # RAM-tight box: cap so a Playwright render spike can't OOM the operator's other
    # apps. ~900m leaves room for one serialized Chromium render (Postgres is external).
    mem_limit: 900m
    mem_reservation: 350m
    healthcheck:
      # /openapi.json is always served by FastAPI and needs no auth — a cheap
      # liveness signal. python is present in the Playwright base image.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/openapi.json', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  web:
    image: ${WEB_IMAGE:-ghcr.io/OWNER/mimik-suite-web:latest}
    # For a LOCAL build:
    # build:
    #   context: ./web
    #   dockerfile: Dockerfile
    #   args:
    #     NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://suite.mimikcreations.com/api}
    restart: unless-stopped
    environment:
      # NOTE: NEXT_PUBLIC_* is inlined at BUILD time, so setting it here only
      # affects server-side reads. Bake the real public API origin as a build
      # arg (see commented build: block) when you build the web image.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://suite.mimikcreations.com/api}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    mem_limit: 450m
    mem_reservation: 200m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Small footprint: cap memory and evict LRU keys rather than OOM the box.
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No published port — only the api service reaches redis over the compose network.

# No named volumes: Postgres is external (Supabase) and redis is ephemeral cache.
